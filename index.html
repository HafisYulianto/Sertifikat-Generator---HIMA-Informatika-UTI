<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat Generator - HIMA Informatika UTI</title>
    
    <link rel="icon" type="image/png" href="logo-hima.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --maroon: #800000;
            --maroon-dark: #5a0000;
            --maroon-light: #a31515;
            --gold: #FFD700;
            --gold-gradient: linear-gradient(135deg, #F1C40F, #F39C12);
            --bg-color: #f4f6f9;
            --text-dark: #333;
            --white: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-dark); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        .header-brand {
            background-color: var(--maroon);
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            margin-bottom: 40px;
        }

        .header-brand h1 { 
            margin: 0; 
            color: var(--gold); 
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 28px;
        }

        .header-brand p { 
            margin: 5px 0 0; 
            color: var(--white); 
            font-size: 16px; 
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .logo-header {
            max-width: 100px; 
            height: auto;
            margin-top: 15px;
            display: inline-block;
        }

        .container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 30px; 
            width: 100%; 
            max-width: 1200px; 
            justify-content: center; 
            padding: 0 20px 40px;
        }
        
        .card { 
            background: var(--white); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border-top: 4px solid var(--maroon);
        }

        .controls { width: 100%; max-width: 450px; }
        .preview { flex: 1; min-width: 320px; text-align: center; }

        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: var(--maroon); 
        }
        
        input[type="file"], input[type="text"], input[type="number"], select, textarea { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            font-size: 14px; 
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--maroon);
            outline: none;
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(128, 0, 0, 0.1);
        }

        textarea { height: 120px; resize: vertical; }
        
        input[type="color"] {
            padding: 5px;
            height: 48px;
            cursor: pointer;
        }

        input[type="range"] {
            accent-color: var(--maroon);
            cursor: pointer;
        }

        .flex-row { display: flex; gap: 15px; }
        .flex-row > div { flex: 1; }

        .btn-zip { 
            width: 100%; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: 700; 
            color: var(--maroon-dark); 
            background: var(--gold-gradient);
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4);
        }

        .btn-zip:hover { 
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(241, 196, 15, 0.6);
            color: var(--maroon);
        }

        .btn-zip:disabled { 
            background: #e0e0e0; 
            color: #999; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }

        canvas { 
            max-width: 100%; 
            height: auto; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: #f9f9f9 url('data:image/svg+xml;utf8,<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="20" fill="none"/><circle cx="2" cy="2" r="1" fill="%23ddd"/></svg>');
            margin-top: 15px;
        }
        
        .status { 
            margin-top: 15px; 
            font-weight: 600; 
            color: var(--maroon); 
            background-color: #fff0f0;
            padding: 10px;
            border-radius: 6px;
            display: inline-block;
        }

        .info-box {
            background: #fff8e1; 
            padding: 15px; 
            border-radius: 8px; 
            border-left: 4px solid var(--gold);
        }
        
        .number-box {
            background: #fdfaf6; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #e0d4c3;
            margin-bottom: 20px;
        }

        #progressText {
            font-size: 14px; 
            margin-top: 15px; 
            text-align: center;
            font-weight: 600;
            color: var(--maroon);
        }

        /* Styling Tambahan untuk Footer */
        .site-footer {
            margin-top: auto; /* Mendorong footer agar selalu di paling bawah */
            background-color: var(--maroon-dark);
            width: 100%;
            padding: 25px 20px;
            text-align: center;
            color: #ccc;
            border-top: 3px solid var(--gold);
        }

        .site-footer p {
            margin: 0 0 15px 0;
            font-size: 15px;
        }

        .site-footer strong {
            color: var(--gold);
            font-weight: 600;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            color: #b0b0b0;
            font-size: 24px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            color: var(--white);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <header class="header-brand">
        <h1>Sertifikat Generator</h1>
        <p>HIMA Informatika - Universitas Teknokrat Indonesia</p>
        <img src="logo-hima.png" alt="Logo HIMA" class="logo-header">
    </header>

    <div class="container">
        <div class="card controls">
            <div class="form-group">
                <label>1. Upload Template (PNG/JPG)</label>
                <input type="file" id="uploadFile" accept="image/*">
            </div>

            <div class="form-group">
                <label>2. Format Teks & Nama</label>
                <select id="selectFont" style="margin-bottom: 10px;">
                    <option value="'Poppins'">Poppins (Modern/Bersih)</option>
                    <option value="Arial">Arial (Standar)</option>
                    <option value="Georgia">Georgia (Elegan/Serif)</option>
                    <option value="'Times New Roman'">Times New Roman (Formal)</option>
                    <option value="'Courier New'">Courier New (Typewriter)</option>
                </select>
                <div class="flex-row">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label style="font-size: 12px;">Ukuran Font Nama</label>
                        <input type="number" id="fontSize" value="80">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label style="font-size: 12px;">Posisi Y Nama</label>
                        <input type="range" id="posY" min="0" max="1000" value="500">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label style="font-size: 12px;">Warna</label>
                        <input type="color" id="fontColor" value="#000000">
                    </div>
                </div>
            </div>

            <div class="number-box">
                <label style="color: #6d4c41;">3. Pengaturan Nomor Sertifikat</label>
                
                <div class="form-group" style="margin-bottom: 10px;">
                    <label style="font-size: 12px;">Format Lengkap Nomor Awal</label>
                    <input type="text" id="startNomor" value="Masukan Nomor Sertifikat">
                </div>
                <div class="form-group" style="margin-bottom: 10px;">
                    <label style="font-size: 12px;">Target Angka yang Dilanjutkan</label>
                    <input type="text" id="targetNomor" value="Masukan Nomor Sertifikat Yang Ingin Dilanjutkan" placeholder="Ketik angka yang ingin ditambah otomatis">
                </div>

                <div class="flex-row" style="margin-top: 10px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label style="font-size: 12px;">Ukuran Font Nomor</label>
                        <input type="number" id="nomorFontSize" value="30">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label style="font-size: 12px;">Posisi Y Nomor</label>
                        <input type="range" id="nomorPosY" min="0" max="1000" value="300">
                    </div>
                </div>
            </div>

            <div class="form-group info-box">
                <label style="color: #b78a00;">4. Daftar Nama Peserta</label>
                <textarea id="listNama" placeholder="Masukkan nama peserta di sini...&#10;Satu baris untuk satu nama.&#10;&#10;Contoh:&#10;Andi Saputra&#10;Siti Aminah"></textarea>
                <small style="color: #666; display: block; margin-top: 5px;">* Teks di baris pertama otomatis muncul di pratinjau.</small>
            </div>

            <button id="btnDownloadZip" class="btn-zip" disabled>
                Generate & Download (.ZIP)
            </button>
            <div id="progressText"></div>
        </div>

        <div class="card preview">
            <label style="font-size: 18px;">Pratinjau Sertifikat</label>
            <p style="color: #777; font-size: 13px; margin-bottom: 15px;">Pastikan posisi nama dan nomor sudah pas sebelum mengunduh.</p>
            
            <canvas id="mainCanvas" width="800" height="600"></canvas>
            <br>
            <div id="statusInfo" class="status">Menunggu upload template...</div>
        </div>
    </div>

    <footer class="site-footer">
        <p>Created by <strong>Hafis Yulianto</strong></p>
        <div class="social-links">
            <a href="https://github.com/hafisyulianto" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/hafisyulianto/" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://www.instagram.com/hafisyulianto_" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
        </div>
    </footer>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const uploadFile = document.getElementById('uploadFile');
        const listNama = document.getElementById('listNama');
        const btnDownloadZip = document.getElementById('btnDownloadZip');
        const progressText = document.getElementById('progressText');

        let templateImg = new Image();
        let isLoaded = false;

        ctx.fillStyle = "#e0e0e0";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "20px Poppins";
        ctx.fillStyle = "#999";
        ctx.textAlign = "center";
        ctx.fillText("Area Pratinjau Desain", canvas.width/2, canvas.height/2);

        // Fungsi Cerdas untuk Auto-Increment Nomor Sertifikat Berdasarkan Target
        function generateNomorOtomatis(formatUtuh, angkaTarget, index) {
            if (!formatUtuh) return "";
            if (!angkaTarget) return formatUtuh;

            // Mencari posisi angka target di dalam string format utuh
            const pos = formatUtuh.indexOf(angkaTarget);
            
            // Jika angka target tidak ditemukan di penomoran, kembalikan format aslinya
            if (pos === -1) return formatUtuh; 

            const prefix = formatUtuh.substring(0, pos);
            const suffix = formatUtuh.substring(pos + angkaTarget.length);

            const angkaBaru = parseInt(angkaTarget, 10) + index;
            // Mempertahankan jumlah digit nol (misal 010 menjadi 011, bukan 11)
            const angkaString = String(angkaBaru).padStart(angkaTarget.length, '0');

            return prefix + angkaString + suffix;
        }

        function drawOne(nama, nomorSertifikat) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);

            const font = document.getElementById('selectFont').value;
            const color = document.getElementById('fontColor').value;
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle'; 
            ctx.fillStyle = color;

            const sizeNama = document.getElementById('fontSize').value;
            const yNama = document.getElementById('posY').value;
            ctx.font = `bold ${sizeNama}px ${font}`;
            ctx.fillText(nama, canvas.width / 2, yNama);

            if (nomorSertifikat) {
                const sizeNomor = document.getElementById('nomorFontSize').value;
                const yNomor = document.getElementById('nomorPosY').value;
                ctx.font = `normal ${sizeNomor}px ${font}`; 
                ctx.fillText(nomorSertifikat, canvas.width / 2, yNomor);
            }
        }

        function updatePreview() {
            if (!isLoaded) return;
            const names = listNama.value.split('\n').filter(n => n.trim() !== "");
            const nameToShow = names.length > 0 ? names[0] : "[NAMA PESERTA]";
            
            const formatUtuh = document.getElementById('startNomor').value;
            const angkaTarget = document.getElementById('targetNomor').value;
            
            const nomorPratinjau = generateNomorOtomatis(formatUtuh, angkaTarget, 0);

            drawOne(nameToShow, nomorPratinjau);
        }

        uploadFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                templateImg.onload = () => {
                    canvas.width = templateImg.width;
                    canvas.height = templateImg.height;
                    
                    document.getElementById('posY').max = templateImg.height;
                    document.getElementById('posY').value = templateImg.height / 2;
                    
                    document.getElementById('nomorPosY').max = templateImg.height;
                    document.getElementById('nomorPosY').value = (templateImg.height / 2) - 150; 

                    isLoaded = true;
                    btnDownloadZip.disabled = false;
                    
                    const statusEl = document.getElementById('statusInfo');
                    statusEl.innerText = "Template Berhasil Dipasang!";
                    statusEl.style.backgroundColor = "#e8f5e9";
                    statusEl.style.color = "#2e7d32";
                    
                    updatePreview();
                };
                templateImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        const inputsToWatch = [listNama, 'selectFont', 'fontSize', 'fontColor', 'posY', 'startNomor', 'targetNomor', 'nomorFontSize', 'nomorPosY'];
        inputsToWatch.forEach(id => {
            const el = typeof id === 'string' ? document.getElementById(id) : id;
            if(el) el.addEventListener('input', updatePreview);
        });

        btnDownloadZip.addEventListener('click', async () => {
            const names = listNama.value.split('\n').filter(n => n.trim() !== "");
            if (names.length === 0) {
                alert("Masukkan minimal satu nama peserta terlebih dahulu!");
                listNama.focus();
                return;
            }

            btnDownloadZip.disabled = true;
            btnDownloadZip.innerText = "Memproses...";
            const zip = new JSZip();
            const total = names.length;
            
            const formatUtuh = document.getElementById('startNomor').value;
            const angkaTarget = document.getElementById('targetNomor').value;

            for (let i = 0; i < total; i++) {
                const nama = names[i].trim();
                const nomorOtomatis = generateNomorOtomatis(formatUtuh, angkaTarget, i);
                
                progressText.innerText = `Membuat: ${i + 1}/${total} (${nama})...`;
                
                drawOne(nama, nomorOtomatis);

                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.95));
                
                // Membersihkan karakter khusus pada nama agar aman untuk format nama file
                const safeName = nama.replace(/[^a-zA-Z0-9 ]/g, "").replace(/\s+/g, '_');
                
                // Format penamaan file diubah menjadi Sertifikat_Nama.jpg
                zip.file(`Sertifikat_${safeName}.jpg`, blob);
            }

            progressText.innerText = "Mengompresi file menjadi ZIP... Mohon tunggu.";
            
            zip.generateAsync({ type: "blob" }).then((content) => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "Hasil_Sertifikat.zip";
                link.click();
                
                btnDownloadZip.disabled = false;
                btnDownloadZip.innerHTML = "Generate & Download (.ZIP)";
                progressText.innerText = "Selesai! File ZIP berhasil diunduh.";
                progressText.style.color = "#2e7d32";
                
                updatePreview(); 
            });
        });
    </script>
</body>
</html>
